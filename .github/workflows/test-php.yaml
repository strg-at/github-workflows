---
name: test php

on:
  workflow_call:
    inputs:
      runner:
        description: '["some-runners"]'
        required: true
        type: string
      php-lint:
        required: false
        type: boolean
        default: true
      php-lint-cmd:
        description: optional args
        required: false
        type: string
        default: null
      php-cs-fixer:
        required: false
        type: boolean
        default: false
      php-cs-fixer-cmd:
        description: optional args
        required: false
        type: string
        default: null
      php-stan:
        required: false
        type: boolean
        default: false
      php-stan-cmd:
        description: path(s) to check and optional args
        required: false
        type: string
        default: analyse /src

jobs:
  test-php:
    name: php
    runs-on: ${{fromJSON(inputs.runner)}}
    steps:
      # https://github.com/marketplace/actions/checkout
      - name: checkout
        uses: actions/checkout@8f4b7f84864484a7bf31766abe9204da3cbe65b3 # v3.5.0

      # https://github.com/marketplace/actions/check-php-syntax-errors
      - name: php-lint
        if: ${{ inputs.php-lint }}
        uses: overtrue/phplint@540dff330004054776a5873b081b170dc32f9e17 # 6.0.0
        with:
          options: ${{ inputs.php-lint-cmd }}

      # https://github.com/marketplace/actions/oskar-php-cs-fixer
      - name: php-cs-fixer
        if: ${{ inputs.php-cs-fixer }}
        uses: docker://oskarstark/php-cs-fixer-ga:3.17.0@sha256:437e6395e110efcbcdac74aa0decaede50ac64a89ebad0b7f33c03e8d4882137
        with:
          args: ${{ inputs.php-cs-fixer-cmd }}

      # https://github.com/marketplace/actions/oskar-phpstan
      - name: php-stan
        if: ${{ inputs.php-stan }}
        uses: docker://oskarstark/phpstan-ga:1.8.0@sha256:72a23af2ecba7f895b1e9d18ac9157e97cb703ae694cb129cca01bc9e5801022
        with:
          args: ${{ inputs.php-stan-cmd }}
