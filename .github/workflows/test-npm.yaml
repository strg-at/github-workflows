---
name: test npm

on:
  workflow_call:
    inputs:
      runner:
        description: '["some-runners"]'
        required: true
        type: string
      audit-cmd:
        description: npm audit --production
        required: false
        type: string
        default: npm audit --production
      lint-cmd:
        description: npm run lint
        required: false
        type: string
        default: npm run lint
      test-cmd:
        description: npm run test
        required: false
        type: string
        default: npm run test
      build-cmd:
        description: npm run build
        required: false
        type: string
        default: npm run build
      working-directory:
        description: "directory containing package.json, relative to repo root"
        required: false
        type: string
        default: "."

jobs:
  test-npm:
    name: npm
    runs-on: ${{fromJSON(inputs.runner)}}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      # https://github.com/marketplace/actions/checkout
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # https://github.com/marketplace/actions/cache
      - name: cache node modules
        id: cache-npm
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory)) }}

      # https://github.com/marketplace/actions/setup-node-js-environment
      - name: setup node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: install
        run: npm ci

      - name: audit
        run: ${{ inputs.audit-cmd }}

      - name: lint
        run: ${{ inputs.lint-cmd }}

      - name: test
        run: ${{ inputs.test-cmd }}

      - name: build
        run: ${{ inputs.build-cmd }}
